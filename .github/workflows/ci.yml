name: CI

on: [push, pull_request]

jobs:
  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and test
        working-directory: ${{ matrix.project == 'backend' && 'ecommerce/backend' || 'ecommerce/frontend' }}
        run: |
          npm install
          # Add additional test commands here
