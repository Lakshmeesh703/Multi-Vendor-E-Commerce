{% extends "base.html" %}

{% block title %}Add Product - Vendor{% endblock %}

{% block content %}
<div class="vendor-form-page">
    <h1>➕ Add New Product</h1>
    
    <form method="POST" class="form">
        <div class="form-group">
            <label for="name">Product Name *</label>
            <input type="text" id="name" name="name" required class="form-input" placeholder="Enter product name">
        </div>
        
        <div class="form-group">
            <label for="category">Category *</label>
            <input type="text" id="category" name="category" required class="form-input" placeholder="e.g., Electronics, Clothing">
        </div>
        
        <div class="form-group">
            <label for="price">Price (USD) *</label>
            <input type="number" id="price" name="price" required step="0.01" min="0" class="form-input" placeholder="0.00">
        </div>
        
        <div class="form-group">
            <label for="stock">Stock Quantity *</label>
            <input type="number" id="stock" name="stock" required min="0" class="form-input" placeholder="0">
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" class="form-input" placeholder="Describe your product..."></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg">Create Product</button>
        <a href="/vendor/products" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
