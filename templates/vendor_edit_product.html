{% extends "base.html" %}

{% block title %}Edit Product - Vendor{% endblock %}

{% block content %}
<div class="vendor-form-page">
    <h1>Edit Product</h1>
    
    <form method="POST" class="form">
        <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" id="name" name="name" value="{{ product.name }}" class="form-input">
        </div>
        
        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" value="{{ product.category }}" class="form-input">
        </div>
        
        <div class="form-group">
            <label for="price">Price (USD)</label>
            <input type="number" id="price" name="price" value="{{ product.price }}" step="0.01" min="0" class="form-input">
        </div>
        
        <div class="form-group">
            <label for="stock">Stock Quantity</label>
            <input type="number" id="stock" name="stock" value="{{ product.stock }}" min="0" class="form-input">
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" class="form-input">{{ product.get('description', '') }}</textarea>
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
        <a href="/vendor/products" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
